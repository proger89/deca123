name: bootstrap

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  deterministic-bootstrap:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Check out exact revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install pinned Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12.10"
      - name: Install pinned uv
        run: python -m pip install uv==0.7.2
      - name: Verify portable layout
        run: python tools/check_repo_layout.py
      - name: Build deterministic image
        run: python run_scenario.py image build --tag deca123-sim:dev
      - name: Run container contract checks
        run: python run_scenario.py quality --checks contract
